name = "aicloud-contact-v1"
main = "src/worker.ts"
compatibility_date = "2026-06-25"
workers_dev = false
preview_urls = false

[[routes]]
pattern = "aicloud.contact"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "force-trailing-slash"
not_found_handling = "404-page"
run_worker_first = true
